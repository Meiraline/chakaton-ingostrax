services:
  api:
    container_name: ${PROJECT_TITLE}_api
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    restart: always
    command: poetry run python -m main
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379  
      OLLAMA_HOST: http://host.docker.internal:11434
    ports:
      - ${FAST_API_PORT}:${FAST_API_PORT}
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:latest
    container_name: ${PROJECT_TITLE}_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_volumes:/var/lib/postgresql
    ports:
      - ${POSTGRES_PORT}:5432

  redis:
    image: redis:latest
    container_name: ${PROJECT_TITLE}_redis
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - redis_data:/data
    env_file:
      - .env


volumes:
  postgres_volumes:
    name: ${PROJECT_TITLE}_postgres_volumes
  redis_data:
    name: ${PROJECT_TITLE}_redis_volumes
